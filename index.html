    <!-- Gizli Canvas (PNG üretimi için) -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // Animasyonlar artık SVG-native SMIL ile yapılıyor.
        // İndirilen SVG'lerde de platform bağımsız çalışır.
        const animationStyles = ``; // SMIL animasyonları zaten SVG elementlerinin içinde

        function downloadSVG(id, isAnimated) {
            const originalSvg = document.getElementById(id);
            const clonedSvg = originalSvg.cloneNode(true);

            clonedSvg.setAttribute("width", "1000");
            clonedSvg.setAttribute("height", "600");

            if (isAnimated) {
                const style = document.createElement('style');
                style.textContent = animationStyles;
                clonedSvg.prepend(style);
            } else {
                clonedSvg.classList.remove('anim-active');
            }

            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(clonedSvg);

            if (!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }

            // --- MAC FIX: Blob kullan ---
            const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = isAnimated ? id + "-animated.svg" : id + "-static.svg";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Temizlik
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function downloadPNG(id) {
            const originalSvg = document.getElementById(id);
            const clonedSvg = originalSvg.cloneNode(true);

            // Kare PNG boyutu
            const canvasSize = 1024;

            // SVG viewBox oranını koru (500:300 = 5:3)
            const viewBoxWidth = 500;
            const viewBoxHeight = 300;
            const aspectRatio = viewBoxWidth / viewBoxHeight;

            // Contain mantığı: kare alana sığdır, yamultma
            let drawWidth, drawHeight;
            if (aspectRatio > 1) {
                // Yatay logo — genişlik sınırlayıcı
                drawWidth = canvasSize;
                drawHeight = canvasSize / aspectRatio;
            } else {
                // Dikey logo — yükseklik sınırlayıcı
                drawHeight = canvasSize;
                drawWidth = canvasSize * aspectRatio;
            }

            // Ortala
            const offsetX = (canvasSize - drawWidth) / 2;
            const offsetY = (canvasSize - drawHeight) / 2;

            // SVG'yi çizim boyutuna ayarla
            clonedSvg.setAttribute("width", drawWidth);
            clonedSvg.setAttribute("height", drawHeight);

            clonedSvg.classList.remove('anim-active');

            const style = document.createElement('style');
            style.textContent = `text { font-family: 'JetBrains Mono', monospace; font-weight: 800; }`;
            clonedSvg.prepend(style);

            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(clonedSvg);

            if (!source.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }

            const img = new Image();
            img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);

            img.onload = function () {
                const canvas = document.createElement("canvas");
                canvas.width = canvasSize;
                canvas.height = canvasSize;
                const ctx = canvas.getContext("2d");

                // Arka planı şeffaf bırak (varsayılan)
                // Logoyu ortaya çiz, oranını koruyarak
                ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);

                // --- MAC FIX: Canvas'ı Blob'a çevir ---
                canvas.toBlob(function (blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;
                    link.download = id + ".png";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                }, 'image/png');
            };
        }
    </script>
